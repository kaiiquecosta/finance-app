<!-- modals/goals.html -->

<div class="overlay" id="m-goal">
  <div class="sheet" style="position:relative">
    <button class="m-close" onclick="closeM('m-goal')">✕</button>
    <div class="m-ttl">Nova meta</div>
    <input class="m-inp" id="g-name" placeholder="Nome (ex: Viagem)"/>
    <!-- Valor alvo com máscara R$ -->
    <div style="position:relative;margin-bottom:12px">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;font-weight:600;pointer-events:none">R$</span>
      <input id="g-tgt" inputmode="numeric" placeholder="0,00"
        style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 14px 12px 38px;color:#fff;font-size:18px;font-family:var(--num);font-weight:700;outline:none;box-sizing:border-box;letter-spacing:.3px"
        oninput="maskDepAmt(this)" onfocus="this.style.borderColor='rgba(34,197,94,0.5)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"/>
    </div>
    <input class="m-inp" id="g-ico" placeholder="Ícone emoji" value="🎯"/>
    <!-- Prazo: seletores de mês + ano -->
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select class="m-sel" id="g-dl-month" style="flex:1;margin-bottom:0">
        <option value="">Mês</option>
        <option value="01">Janeiro</option>
        <option value="02">Fevereiro</option>
        <option value="03">Março</option>
        <option value="04">Abril</option>
        <option value="05">Maio</option>
        <option value="06">Junho</option>
        <option value="07">Julho</option>
        <option value="08">Agosto</option>
        <option value="09">Setembro</option>
        <option value="10">Outubro</option>
        <option value="11">Novembro</option>
        <option value="12">Dezembro</option>
      </select>
      <select class="m-sel" id="g-dl-year" style="flex:1;margin-bottom:0"></select>
    </div>
    <button class="m-btn" onclick="addGoal()">Criar meta</button>
  </div>
</div>

<div class="overlay" id="m-dep">
  <div class="sheet" style="position:relative">
    <button class="m-close" onclick="closeM('m-dep')">✕</button>
    <div class="m-ttl" id="dep-ttl">Depositar</div>
    <!-- Abas -->
    <div style="display:flex;gap:0;margin-bottom:14px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px">
      <button id="dep-tab-add" onclick="setDepTab('add')" style="flex:1;padding:7px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;background:var(--green);color:#000">⬆ Depositar</button>
      <button id="dep-tab-rem" onclick="setDepTab('rem')" style="flex:1;padding:7px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;background:transparent;color:var(--muted)">⬇ Retirar</button>
    </div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:14px" id="dep-msg"></div>
    <!-- Campo valor com máscara R$ -->
    <div style="position:relative;margin-bottom:12px">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;font-weight:600;pointer-events:none">R$</span>
      <input id="dep-amt" inputmode="numeric" placeholder="0,00"
        style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 14px 12px 38px;color:#fff;font-size:18px;font-family:var(--num);font-weight:700;outline:none;box-sizing:border-box;letter-spacing:.3px"
        oninput="maskDepAmt(this)" onfocus="this.style.borderColor='rgba(34,197,94,0.5)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"/>
    </div>
    <!-- Conta -->
    <div id="dep-account-section" style="margin-bottom:12px">
      <div id="dep-account-label" style="color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">De qual conta?</div>
      <div id="dep-account-chips" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <button class="m-btn" id="dep-confirm-btn" onclick="doDeposit()">Depositar</button>
  </div>
</div>
