<!-- views/theme-chooser.html -->

<div id="theme-chooser" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:10000;align-items:center;justify-content:center;padding:24px">
  <div style="max-width:480px;width:100%;text-align:center">
    <div style="font-size:48px;margin-bottom:16px">✨</div>
    <div style="font-family:var(--num);font-size:26px;font-weight:800;color:#fff;margin-bottom:8px">Bem-vindo ao Finance!</div>
    <div style="color:var(--muted);font-size:15px;margin-bottom:32px;line-height:1.5">Antes de começar, escolha o tema que mais combina com você</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px">

      <!-- Dark -->
      <div id="theme-opt-dark" onclick="selectThemeOpt('dark')"
        style="background:#111118;border:2px solid rgba(34,197,94,0.5);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;position:relative">
        <div style="background:#1a1a2a;border-radius:10px;padding:12px;margin-bottom:12px">
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:#22c55e"></div>
            <div style="height:8px;background:rgba(255,255,255,0.15);border-radius:4px;flex:1"></div>
          </div>
          <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:5px"></div>
          <div style="height:6px;background:rgba(255,255,255,0.05);border-radius:3px;width:70%"></div>
        </div>
        <div style="color:#fff;font-weight:700;font-size:14px">🌙 Escuro</div>
        <div style="color:#64748b;font-size:12px;margin-top:3px">Suave para os olhos</div>
        <div id="theme-check-dark" style="position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:11px">✓</div>
      </div>

      <!-- Light -->
      <div id="theme-opt-light" onclick="selectThemeOpt('light')"
        style="background:#f0f2f5;border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;position:relative">
        <div style="background:#fff;border-radius:10px;padding:12px;margin-bottom:12px">
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:#16a34a"></div>
            <div style="height:8px;background:rgba(0,0,0,0.1);border-radius:4px;flex:1"></div>
          </div>
          <div style="height:6px;background:rgba(0,0,0,0.07);border-radius:3px;margin-bottom:5px"></div>
          <div style="height:6px;background:rgba(0,0,0,0.05);border-radius:3px;width:70%"></div>
        </div>
        <div style="color:#0f172a;font-weight:700;font-size:14px">☀️ Claro</div>
        <div style="color:#64748b;font-size:12px;margin-top:3px">Limpo e minimalista</div>
        <div id="theme-check-light" style="position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;font-size:11px;color:#64748b">✓</div>
      </div>

    </div>

    <button onclick="confirmThemeChoice()"
      style="width:100%;background:#22c55e;border:none;border-radius:12px;padding:16px;color:#000;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);transition:opacity .2s"
      onmouseenter="this.style.opacity='.85'" onmouseleave="this.style.opacity='1'">
      Começar →
    </button>
    <div style="color:#475569;font-size:12px;margin-top:12px">Você pode mudar o tema a qualquer momento nas configurações</div>
  </div>
</div>
