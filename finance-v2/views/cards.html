<!-- views/cards.html -->

<!-- ── CARDS ── -->
<div class="page" id="page-cards">
  <div class="page-hdr">
    <div class="sec-hdr">
      <div><div class="sec-ttl">Cartões</div><div class="sec-sub">Faturas e limites</div></div>
      <button onclick="openM('m-card')" style="background:var(--green);border:none;border-radius:8px;padding:8px 16px;color:#000;font-size:13px;font-weight:700">＋ Cartão</button>
    </div>
  </div>
  <div class="month-nav" style="position:relative">
    <button class="month-btn" onclick="chCardMonth(-1)">‹</button>
    <div style="flex:1;text-align:center;position:relative">
      <div id="card-month-lbl"
        onclick="toggleCardMonthPicker()"
        style="color:#fff;font-weight:700;font-size:15px;font-family:var(--num);cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;transition:background .15s;user-select:none"
        onmouseenter="this.style.background='rgba(255,255,255,0.07)'"
        onmouseleave="this.style.background='transparent'"
      >Março de 2025 <span style="font-size:11px;color:var(--muted)">▾</span></div>
      <div style="color:var(--muted);font-size:11px;margin-top:2px">Soma das faturas</div>
      <!-- Calendário picker -->
      <div id="card-month-picker" style="
        display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
        background:#16161f;border:1px solid rgba(255,255,255,0.1);border-radius:14px;
        padding:16px;z-index:200;width:260px;box-shadow:0 8px 32px rgba(0,0,0,0.6);
        text-align:left;
      ">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <button onclick="shiftPickerYear(-1)" style="background:rgba(255,255,255,0.06);border:none;border-radius:6px;width:28px;height:28px;color:#fff;font-size:14px;cursor:pointer">‹</button>
          <span id="picker-year-lbl" style="color:#fff;font-weight:700;font-family:var(--num);font-size:14px"></span>
          <button onclick="shiftPickerYear(1)" style="background:rgba(255,255,255,0.06);border:none;border-radius:6px;width:28px;height:28px;color:#fff;font-size:14px;cursor:pointer">›</button>
        </div>
        <div id="picker-months-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"></div>
        <button onclick="goPickerToday()" id="picker-today-btn" style="display:none;width:100%;margin-top:10px;padding:7px;border-radius:8px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.25);color:#60a5fa;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">↩ Voltar para fatura atual</button>
      </div>
    </div>
    <button class="month-btn" onclick="chCardMonth(1)">›</button>
  </div>
  <div class="grid2" style="margin-bottom:16px">
    <div class="card card-sm" style="text-align:center">
      <div class="card-label">💳 Total a pagar</div>
      <div class="num-lg" id="card-total" style="color:#fff">—</div>
    </div>
    <div class="card card-sm">
      <div class="card-label">Evolução das faturas</div>
      <div class="chart-wrap" id="card-chart" style="height:60px"></div>
      <div class="chart-labels" id="card-chart-lbl"></div>
    </div>
  </div>
  <div id="cards-list" style="display:flex;flex-direction:column;gap:16px"></div>
</div>
